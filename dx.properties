# This is a property file for HCL DX Compose docker-compose.
# Your environment will be configured using the variables specified in this file.
# In case of loading new docker images downloaded from Flexnet using the "load.sh"
# script file, this property file will be automatically updated.
# In case you are using another mechanism to update your docker repository with
# new images, please make sure to manually update this file, too.
# DX WebEngine Develop image of CF224 used here
# Update this first to the release you want to deploy
# Log in to https://hclcr.io, select DX Compose https://hclcr.io/harbor/projects/104/repositories
# And for each of the entries, update to use the tag of your selected release 
# E.g. for CF233: DX_DOCKER_IMAGE_CONTENT_COMPOSER
DX_DOCKER_IMAGE_CONTENT_COMPOSER=
DX_DOCKER_IMAGE_WEBENGINE=
DX_DOCKER_IMAGE_DIGITAL_ASSET_MANAGER=
DX_DOCKER_IMAGE_DATABASE_NODE_DIGITAL_ASSET_MANAGER=
DX_DOCKER_IMAGE_DATABASE_CONNECTION_POOL_DIGITAL_ASSET_MANAGER=
DX_DOCKER_IMAGE_IMAGE_PROCESSOR=
DX_DOCKER_IMAGE_RING_API=
DX_DOCKER_IMAGE_HAPROXY=
DX_DOCKER_IMAGE_OPENSEARCH=
DX_DOCKER_IMAGE_FILE_PROCESSOR=
DX_DOCKER_IMAGE_SEARCH_MIDDLEWARE=
DX_DOCKER_IMAGE_PEOPLE_SERVICE=
